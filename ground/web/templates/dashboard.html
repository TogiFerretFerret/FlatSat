<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Engineering Console</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #111; --border: #333; --text: #00ff41; --dim: #00661a; --warn: #ffcc00; --alert: #ff0000; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', 'Courier New', monospace; padding: 10px; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        
        header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--text); margin-bottom: 10px; padding-bottom: 5px; }
        .main-grid { display: grid; grid-template-columns: 260px 1fr 260px; gap: 10px; flex-grow: 1; min-height: 0; }
        .col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 8px; }
        h2 { margin: 0 0 5px 0; font-size: 0.9em; color: #fff; border-bottom: 1px solid var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        
        .data-row { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 3px; }
        .data-val { font-weight: bold; color: #fff; }
        
        .vid-container { flex-grow: 1; background: #000; border: 1px solid var(--border); position: relative; display: flex; align-items: center; justify-content: center; }
        img.main-feed { max-width: 100%; max-height: 100%; }
        .overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px; font-size: 0.8em; border: 1px solid var(--dim); }

        .bar-bg { width: 100%; height: 6px; background: #222; margin-top: 2px; }
        .bar-fill { height: 100%; background: var(--text); width: 0%; transition: width 0.2s; }

        .btn { background: var(--panel); border: 1px solid var(--text); color: var(--text); width: 100%; padding: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn:hover { background: var(--dim); color: #fff; }
        
        .thumb-container { position: relative; height: 100%; min-width: 100px; aspect-ratio: 16/9; }
        .thumb { height: 100%; width: 100%; object-fit: cover; border: 1px solid #444; cursor: pointer; }
        .analyze-badge { position: absolute; bottom: 2px; right: 2px; background: #00ff41; color: #000; font-size: 10px; padding: 2px 4px; border-radius: 2px; cursor: pointer; font-weight: bold; opacity: 0.8; }
        .analyze-badge:hover { opacity: 1; transform: scale(1.1); }

        /* Lightbox */
        #lightbox { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
        .lb-content { display: flex; background: #111; border: 1px solid var(--text); max-width: 90%; max-height: 90%; }
        .lb-sidebar { width: 250px; padding: 15px; border-left: 1px solid #333; }
    </style>
</head>
<body>
    <header>
        <div>ARTEMIS // ENGINEERING TELEMETRY</div>
        <div id="conn-status" style="color:red">DISCONNECTED</div>
    </header>

    <div class="main-grid">
        <div class="col">
            <div class="panel">
                <h2>Attitude & Motion</h2>
                <div class="data-row"><span>HEADING</span><span class="data-val" id="att-yaw">0°</span></div>
                <div class="data-row"><span>PITCH</span><span class="data-val" id="att-pitch">0°</span></div>
                <div class="data-row"><span>ROLL</span><span class="data-val" id="att-roll">0°</span></div>
                <div class="data-row" style="margin-top:5px; border-top:1px solid #333;"><span>TOTAL G</span><span class="data-val" id="total-g">1.00</span></div>
            </div>
            <div class="panel">
                <h2>Health & Power</h2>
                <div class="data-row"><span>INPUT EST</span><span class="data-val" id="bat-input">0.00 V</span></div>
            </div>
        </div>

        <div class="col">
            <div class="vid-container">
                <img class="main-feed" src="/stream" onerror="this.style.display='none'">
                <div class="overlay">LIVE OPTICAL FEED [720p]</div>
            </div>
            <button class="btn" onclick="snap()">ACQUIRE HIGH-RES TARGET (5MP)</button>
            <div id="gallery" style="height:100px; background:#000; border:1px solid var(--border); display:flex; gap:8px; overflow-x:auto; padding:8px;"></div>
        </div>

        <div class="col">
            <div class="panel">
                <h2>Optical Sensor</h2>
                <div class="data-row"><span>EXPOSURE</span><span class="data-val" id="cam-exp">0 ms</span></div>
                <div class="data-row"><span>AF STATE</span><span class="data-val" id="cam-lens">IDLE</span></div>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <div class="lb-content" onclick="event.stopPropagation()">
            <img id="lb-img" style="max-width: 70vw; max-height: 80vh; object-fit: contain;">
            <div class="lb-sidebar">
                <h2 id="lb-title">MISSION SNAPSHOT</h2>
                <div id="lb-meta" style="font-size: 0.8em; margin-bottom: 20px;"></div>
                <button class="btn" id="btn-toggle-map" onclick="toggleMap()">VIEW HAZARD MAP</button>
                <button class="btn" style="border-color:#666; color:#888;" onclick="closeLightbox()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let currentImg = "";
        let showingMap = false;

        async function updateDisplay() {
            try {
                let res = await fetch('/api/telemetry');
                let d = await res.json();
                if(d.attitude) {
                    document.getElementById('att-yaw').innerText = d.attitude.yaw.toFixed(0) + "°";
                    document.getElementById('att-pitch').innerText = d.attitude.pitch.toFixed(0) + "°";
                    document.getElementById('att-roll').innerText = d.attitude.roll.toFixed(0) + "°";
                }
                if(d.total_g) document.getElementById('total-g').innerText = d.total_g;
                if(d.power && d.power.input_est) document.getElementById('bat-input').innerText = d.power.input_est + " V";
                document.getElementById('conn-status').innerText = d.status || "OFFLINE";
                document.getElementById('conn-status').style.color = (d.status === "ONLINE") ? "#00ff41" : "red";
            } catch(e) {}
        }

        async function snap() {
            await fetch('/snapshot', {method:'POST'});
            loadGal();
        }

        async function loadGal() {
            let res = await fetch('/api/captures');
            let files = await res.json();
            let g = document.getElementById('gallery');
            g.innerHTML = "";
            files.forEach(f => {
                let container = document.createElement('div');
                container.className = "thumb-container";
                
                let i = document.createElement('img');
                i.src = "/captures/" + f;
                i.className = "thumb";
                i.onclick = () => openLightbox(f);
                
                let b = document.createElement('div');
                b.className = "analyze-badge";
                b.innerText = "SCAN";
                b.onclick = (e) => { e.stopPropagation(); analyze(f); };
                
                container.appendChild(i);
                container.appendChild(b);
                g.appendChild(container);
            });
        }

        async function analyze(f) {
            alert("Starting Lunar Terrain Analysis...");
            let res = await fetch('/api/analyze/' + f, {method: 'POST'});
            let data = await res.json();
            if(data.status === "success") {
                alert("Scan Complete.");
                openLightbox(f); // Open with analysis ready
            }
        }

        function openLightbox(f) {
            currentImg = f;
            showingMap = false;
            document.getElementById('btn-toggle-map').innerText = "VIEW HAZARD MAP";
            document.getElementById('lb-img').src = "/captures/" + f;
            document.getElementById('lb-title').innerText = f;
            document.getElementById('lightbox').style.display = "flex";
            
            // Try fetch metadata
            fetch("/captures/" + f.replace(".jpg", ".json")).then(r => r.json()).then(m => {
                document.getElementById('lb-meta').innerHTML = `
                    Time: ${new Date(m.timestamp * 1000).toLocaleTimeString()}<br>
                    Exp: ${m.exposure_sec}s<br>
                    Pose: [${m.pose_quaternion_wxyz.map(v => v.toFixed(2)).join(",")}]
                `;
            });
        }

        function toggleMap() {
            const img = document.getElementById('lb-img');
            const btn = document.getElementById('btn-toggle-map');
            if(!showingMap) {
                img.src = "/captures/" + currentImg.replace(".jpg", "_landing_analysis.png");
                btn.innerText = "VIEW RAW IMAGE";
                showingMap = true;
            } else {
                img.src = "/captures/" + currentImg;
                btn.innerText = "VIEW HAZARD MAP";
                showingMap = false;
            }
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = "none"; }

        setInterval(updateDisplay, 500);
        loadGal();
    </script>
</body>
</html>
