    <script>
        // --- 3D SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 240/180, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(230, 180);
        document.getElementById('container-3d').appendChild(renderer.domElement);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const materials = [
            new THREE.MeshPhongMaterial({ color: 0xff4444 }), 
            new THREE.MeshPhongMaterial({ color: 0xaa2222 }), 
            new THREE.MeshPhongMaterial({ color: 0x44ff44 }), 
            new THREE.MeshPhongMaterial({ color: 0x888888 }), 
            new THREE.MeshPhongMaterial({ color: 0x4444ff }), 
            new THREE.MeshPhongMaterial({ color: 0x2222aa })
        ];
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);

        const axesHelper = new THREE.AxesHelper(2.5);
        cube.add(axesHelper);
        camera.position.set(0, 2, 4);
        camera.lookAt(0, 0, 0);

        function animate3D() { requestAnimationFrame(animate3D); renderer.render(scene, camera); }
        animate3D();

        // --- CHART SETUP ---
        const ctxAccel = document.getElementById('chart-accel').getContext('2d');
        const chartAccel = new Chart(ctxAccel, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [
                    { label: 'X', data: Array(50).fill(0), borderColor: '#ff4444', borderWidth: 1, pointRadius: 0, tension: 0.1 },
                    { label: 'Y', data: Array(50).fill(0), borderColor: '#44ff44', borderWidth: 1, pointRadius: 0, tension: 0.1 },
                    { label: 'Z', data: Array(50).fill(0), borderColor: '#4444ff', borderWidth: 1, pointRadius: 0, tension: 0.1 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                scales: { x: { display: false }, y: { grid: { color: '#222' }, ticks: { color: '#666', font: {size: 9} }, suggestedMin: -10, suggestedMax: 10 } },
                plugins: { legend: { display: false } }
            }
        });

        // --- UI & TELEMETRY ---
        const ui = {
            conn: document.getElementById('conn-status'),
            att_yaw: document.getElementById('att-yaw'), att_pitch: document.getElementById('att-pitch'), att_roll: document.getElementById('att-roll'),
            ax: document.getElementById('ax'), ay: document.getElementById('ay'), az: document.getElementById('az'),
            gx: document.getElementById('gx'), gy: document.getElementById('gy'), gz: document.getElementById('gz'),
            mx: document.getElementById('mx'), my: document.getElementById('my'), mz: document.getElementById('mz'),
            qw: document.getElementById('qw'), qx: document.getElementById('qx'), qy: document.getElementById('qy'), qz: document.getElementById('qz'),
            debug_q: document.getElementById('debug-q'),
            total_g: document.getElementById('total-g'), jerk: document.getElementById('jerk'), motion_state: document.getElementById('motion-state'),
            cam_fps: document.getElementById('cam-fps'), cam_exp: document.getElementById('cam-exp'),
            cam_gain: document.getElementById('cam-gain'), cam_dgain: document.getElementById('cam-dgain'),
            cam_awb: document.getElementById('cam-awb'), cam_lens: document.getElementById('cam-lens'), cam_res: document.getElementById('cam-res'),
            net_rx: document.getElementById('net-rx'), net_tx: document.getElementById('net-tx'), link_qual: document.getElementById('link-qual'),
            wifi_rssi: document.getElementById('wifi-rssi'), wifi_retry: document.getElementById('wifi-retry'), 
            wifi_missed: document.getElementById('wifi-missed'), bt_rssi: document.getElementById('bt-rssi'), ip_addr: document.getElementById('ip-addr'),
            cpu_volts: document.getElementById('cpu-volts'), cpu_clock: document.getElementById('cpu-clock'),
            throttle_hex: document.getElementById('throttle-hex'), sys_threads: document.getElementById('sys-threads'),
            cpu_load: document.getElementById('cpu-load'), cpu_temp: document.getElementById('cpu-temp'), imu_temp: document.getElementById('imu-temp'),
            bat_level: document.getElementById('bat-level'), bat_volts: document.getElementById('bat-volts'), 
            bat_input: document.getElementById('bat-input'), bat_charging: document.getElementById('bat-charging'), 
            bat_temp: document.getElementById('bat-temp'), bat_plugged: document.getElementById('bat-plugged'), bar_bat: document.getElementById('bar-bat'),
            ram_use: document.getElementById('ram-use'), gpu_mem: document.getElementById('gpu-mem'), disk_use: document.getElementById('disk-use'), img_cap: document.getElementById('img-cap'),
            bar_load: document.getElementById('bar-load'), bar_temp: document.getElementById('bar-temp'), 
            bar_ram: document.getElementById('bar-ram'), bar_disk: document.getElementById('bar-disk'),
            proc_list: document.getElementById('proc-list'), gallery: document.getElementById('gallery'), uptime: document.getElementById('uptime')
        };

        let offsetQuaternion = new THREE.Quaternion();
        let lastReceivedQuaternion = new THREE.Quaternion();
        let currentFilename = null;
        let mappingActive = false;
        let chargingState = true;

        async function pollProgress(taskId, btnId, progressContainerId) {
            const btn = document.getElementById(btnId);
            const progressBar = progressContainerId ? document.getElementById(progressContainerId) : null;
            const progressFill = progressBar ? progressBar.querySelector('.progress-fill') : null;
            if (progressBar) progressBar.style.display = 'block';

            return new Promise((resolve) => {
                const interval = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/progress/${taskId}`);
                        const data = await res.json();
                        if (data.msg !== "Pending") {
                            btn.innerText = `${data.msg} (${Math.round(data.p * 100)}%)`;
                            if (progressFill) progressFill.style.width = (data.p * 100) + "%";
                        }
                        if (data.p >= 1) { clearInterval(interval); if (progressBar) progressBar.style.display = 'none'; resolve(); }
                    } catch (e) { clearInterval(interval); resolve(); }
                }, 500);
            });
        }

        async function analyzeCurrentImage() {
            if (!currentFilename) return;
            const btn = document.getElementById('btn-analyze');
            const originalText = "ANALYZE LANDING SITE";
            const taskId = "analyze_" + Date.now();
            btn.disabled = true;
            const pollPromise = pollProgress(taskId, 'btn-analyze', 'analyze-progress-container');
            try {
                const res = await fetch(`/api/analyze/${currentFilename}?task_id=${taskId}`, { method: 'POST' });
                const data = await res.json();
                await pollPromise;
                if (data.status === 'success') {
                    document.getElementById('lightbox-img').src = data.analysis_url + "?t=" + Date.now();
                    btn.innerText = "ANALYSIS COMPLETE";
                    loadGal();
                } else { alert("Analysis Failed: " + data.msg); btn.innerText = originalText; btn.disabled = false; }
            } catch (e) { alert("Request Failed: " + e); btn.innerText = originalText; btn.disabled = false; }
        }

        async function handleUpload(input) {
            if (!input.files || input.files.length === 0) return;
            const formData = new FormData(); formData.append('file', input.files[0]);
            const btn = document.getElementById('btn-upload');
            const originalText = "UPLOAD & ANALYZE";
            const taskId = "upload_" + Date.now();
            btn.disabled = true;
            const pollPromise = pollProgress(taskId, 'btn-upload');
            try {
                const res = await fetch(`/api/upload?task_id=${taskId}`, { method: 'POST', body: formData });
                const data = await res.json();
                await pollPromise;
                if (data.status === 'success') { openLightbox(data.analysis_url); loadGal(); }
                else { alert("Upload Failed: " + data.msg); }
            } catch (e) { alert("Request Failed: " + e); }
            finally { btn.innerText = originalText; btn.disabled = false; input.value = ""; }
        }

        async function stitchAndAnalyze() {
            const checks = document.querySelectorAll('.gallery-check:checked');
            const filenames = Array.from(checks).map(c => c.value);
            if (filenames.length < 2) { alert("Please select at least 2 images to stitch."); return; }
            const btn = document.getElementById('btn-stitch');
            const originalText = "STITCH & ANALYZE";
            const taskId = "stitch_" + Date.now();
            btn.disabled = true;
            const pollPromise = pollProgress(taskId, 'btn-stitch');
            try {
                const res = await fetch(`/api/stitch_and_analyze?task_id=${taskId}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({filenames: filenames})
                });
                const data = await res.json();
                await pollPromise;
                if (data.status === 'success') { openLightbox(data.analysis_url); loadGal(); }
                else { alert("Stitching Failed: " + data.msg); }
            } catch (e) { alert("Request Failed: " + e); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h}h ${m}m ${s}s`;
        }

        const evtSource = new EventSource("/telemetry_stream");
        evtSource.onmessage = (e) => {
            const d = JSON.parse(e.data);
            ui.conn.innerText = d.status || "OFFLINE";
            ui.conn.style.color = (d.status === "ONLINE") ? "#00ff41" : "red";

            if (d.quaternion) {
                const q = d.quaternion;
                lastReceivedQuaternion.set(q[1], q[2], q[3], q[0]); 
                const displayQ = offsetQuaternion.clone().multiply(lastReceivedQuaternion);
                cube.quaternion.slerp(displayQ, 0.5);
                ui.qw.innerText = q[0].toFixed(3); ui.qx.innerText = q[1].toFixed(3);
                ui.qy.innerText = q[2].toFixed(3); ui.qz.innerText = q[3].toFixed(3);
                ui.debug_q.innerText = `${q[0].toFixed(2)}, ${q[1].toFixed(2)}, ${q[2].toFixed(2)}, ${q[3].toFixed(2)}`;
                
                const euler = new THREE.Euler().setFromQuaternion(displayQ, 'YXZ');
                ui.att_yaw.innerText = Math.round(THREE.MathUtils.radToDeg(euler.y)) + "°";
                ui.att_pitch.innerText = Math.round(THREE.MathUtils.radToDeg(euler.x)) + "°";
                ui.att_roll.innerText = Math.round(THREE.MathUtils.radToDeg(euler.z)) + "°";
            }

            if (d.accel) {
                ui.ax.innerText = d.accel.x.toFixed(2); ui.ay.innerText = d.accel.y.toFixed(2); ui.az.innerText = d.accel.z.toFixed(2);
                chartAccel.data.datasets[0].data.push(d.accel.x); chartAccel.data.datasets[0].data.shift();
                chartAccel.data.datasets[1].data.push(d.accel.y); chartAccel.data.datasets[1].data.shift();
                chartAccel.data.datasets[2].data.push(d.accel.z); chartAccel.data.datasets[2].data.shift();
                chartAccel.update('none');
                ui.total_g.innerText = (Math.sqrt(d.accel.x**2 + d.accel.y**2 + d.accel.z**2) / 9.81).toFixed(2);
            }
            if (d.gyro) { ui.gx.innerText = d.gyro.x.toFixed(1); ui.gy.innerText = d.gyro.y.toFixed(1); ui.gz.innerText = d.gyro.z.toFixed(1); }
            if (d.mag) { ui.mx.innerText = d.mag.x.toFixed(0); ui.my.innerText = d.mag.y.toFixed(0); ui.mz.innerText = d.mag.z.toFixed(0); }
            if (d.jerk !== undefined) ui.jerk.innerText = d.jerk.toFixed(1);

            if (d.sys) {
                ui.cpu_load.innerText = d.sys.cpu_load + "%"; ui.bar_load.style.width = d.sys.cpu_load + "%";
                ui.cpu_temp.innerText = d.sys.cpu_temp + "C"; ui.bar_temp.style.width = Math.min((d.sys.cpu_temp/85)*100, 100) + "%";
                ui.imu_temp.innerText = (d.sys.imu_temp || 0) + "C";
                ui.ram_use.innerText = `${d.sys.ram_used_mb}/${d.sys.ram_total_mb} MB`; ui.bar_ram.style.width = d.sys.ram_percent + "%";
                ui.disk_use.innerText = `${d.sys.disk_used_gb}/${d.sys.disk_total_gb} GB`; ui.bar_disk.style.width = d.sys.disk_percent + "%";
                ui.uptime.innerText = formatUptime(d.sys.uptime_script || 0);
                ui.sys_threads.innerText = d.sys.active_threads || 0;
                ui.throttle_hex.innerText = d.sys.throttle_hex || "0x0";
                ui.ip_addr.innerText = d.sys.ip_addr || "--";
                if (d.sys.processes) ui.proc_list.innerHTML = d.sys.processes.map(p => `<tr><td>${p.pid}</td><td>${p.name}</td><td>${p.cpu}%</td><td>${p.mem}%</td></tr>`).join('');
            }

            if (d.power) {
                ui.bat_level.innerText = d.power.level + "%"; ui.bar_bat.style.width = d.power.level + "%";
                ui.bat_volts.innerText = d.power.voltage + " V";
                ui.bat_charging.innerText = d.power.charging ? "CHARGING" : "DISCHG";
                ui.bat_input.innerText = `${d.power.input_est || '--'} V / ${d.power.watts || '--'} W`;
                ui.bat_plugged.innerText = d.power.plugged ? "YES" : "NO";
                ui.bat_temp.innerText = d.power.temp + "°C";
                chargingState = d.power.charging;
                ui.btn_chg.innerText = chargingState ? "CHG: ON" : "CHG: OFF";
            }

            if (d.cam_meta) {
                ui.cam_fps.innerText = d.cam_meta.fps.toFixed(1); ui.cam_res.innerText = d.cam_meta.res;
                ui.cam_exp.innerText = d.cam_meta.exp_ms.toFixed(1) + "ms";
                ui.cam_gain.innerText = d.cam_meta.a_gain.toFixed(1) + "x";
            }

            if (d.mapping_status) {
                mappingActive = d.mapping_status === 'active';
                document.getElementById('mapping-overlay').style.display = mappingActive ? 'block' : 'none';
                document.getElementById('mapping-count').innerText = d.mapping_frames || 0;
                document.getElementById('btn-mapping').innerText = mappingActive ? "STOP MAPPING" : "AUTO-MAPPING MODE";
                const previewPanel = document.getElementById('mapping-preview-panel');
                if (mappingActive && d.mapping_image) {
                    previewPanel.style.display = 'flex';
                    document.getElementById('mapping-img').src = `/captures/${d.mapping_image}?t=${Date.now()}`;
                } else if (!mappingActive) { previewPanel.style.display = 'none'; }
            }
        };

        async function snap(exp=0) { await fetch(`/snapshot${exp ? '?exposure='+exp : ''}`, {method:'POST'}); loadGal(); }
        async function toggleMapping() { await fetch(`/api/mapping/${mappingActive ? 'stop' : 'start'}`, {method:'POST'}); }
        async function calibrateIMU() { offsetQuaternion.copy(lastReceivedQuaternion).invert(); }
        async function toggleCharging() { await fetch('/api/power', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'charging', value:!chargingState})}); }
        async function setClock(mode) { await fetch('/api/clock', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode:mode})}); }
        async function setI2C(baud) { await fetch('/api/i2c', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({baudrate:parseInt(baud)})}); }

        async function loadGal() {
            try {
                const res = await fetch('/api/captures');
                const files = await res.json();
                ui.gallery.innerHTML = files.map(f => `
                    <div class="gallery-item">
                        <input type="checkbox" class="gallery-check" value="${f}" onclick="event.stopPropagation()">
                        <img src="/captures/${f}?t=${Date.now()}" class="thumb" onclick="openLightbox('/captures/${f}')">
                    </div>`).join('');
            } catch(e) {}
        }

        async function openLightbox(src) {
            currentFilename = src.split('/').pop().split('?')[0];
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('btn-analyze').style.display = currentFilename.includes("_landing_analysis") ? "none" : "block";
            document.getElementById('btn-analyze').innerText = "ANALYZE LANDING SITE";
            document.getElementById('btn-analyze').disabled = false;
            
            try {
                const res = await fetch(src.replace(/\.(jpg|jpeg)/i, ".json"));
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('meta-time').innerText = new Date(data.timestamp * 1000).toLocaleTimeString();
                    document.getElementById('meta-date').innerText = new Date(data.timestamp * 1000).toLocaleDateString();
                    document.getElementById('meta-exp').innerText = data.exposure_sec.toFixed(2) + " s";
                    document.getElementById('meta-qw').innerText = data.pose_quaternion_wxyz[0].toFixed(3);
                    document.getElementById('meta-qx').innerText = data.pose_quaternion_wxyz[1].toFixed(3);
                    document.getElementById('meta-qy').innerText = data.pose_quaternion_wxyz[2].toFixed(3);
                    document.getElementById('meta-qz').innerText = data.pose_quaternion_wxyz[3].toFixed(3);
                    document.getElementById('meta-accel').innerText = `${data.accel_ms2.x.toFixed(2)}, ${data.accel_ms2.y.toFixed(2)}, ${data.accel_ms2.z.toFixed(2)}`;
                }
            } catch(e) {}
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        
        loadGal();
        setInterval(loadGal, 5000);
    </script>
</body>
</html>
